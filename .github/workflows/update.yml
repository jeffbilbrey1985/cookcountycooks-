name: Daily Sales Board Update

on:
  push:
  schedule:
    - cron: '15 14 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract Excel from Zapier report and save to data/
        run: |
          # Find the most recent txt file Zapier uploaded
          LATEST_TXT=$(ls -t reports/*.txt 2>/dev/null | head -1)
          if [ -z "$LATEST_TXT" ]; then
            echo "No Zapier txt file found, using existing Excel"
          else
            echo "Reading: $LATEST_TXT"
            # Extract the Excel file URL (line with fileType: .xlsx)
            XLSX_URL=$(grep -A1 'fileType: .xlsx' "$LATEST_TXT" | grep '^file:' | head -1 | sed 's/file: //')
            if [ -z "$XLSX_URL" ]; then
              # Try alternate format
              XLSX_URL=$(awk '/spreadsheetml/{found=1} found && /^file:/{print $2; exit}' "$LATEST_TXT")
            fi
            if [ -n "$XLSX_URL" ]; then
              echo "Downloading Excel from Zapier S3..."
              curl -L -o "data/Sales Report.xlsx" "$XLSX_URL"
              FILE_SIZE=$(wc -c < "data/Sales Report.xlsx")
              echo "Downloaded: $FILE_SIZE bytes"
              if [ "$FILE_SIZE" -lt 10000 ]; then
                echo "ERROR: File too small ($FILE_SIZE bytes) - download may have failed"
                exit 1
              fi
              git config user.name "GitHub Actions Bot"
              git config user.email "actions@github.com"
              git add "data/Sales Report.xlsx"
              git diff --staged --quiet || git commit -m "Auto-update: Sales Report.xlsx from Zapier"
              git push || true
            else
              echo "No Excel URL found in txt file, using existing data"
            fi
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas openpyxl

      - name: Build sales board
        run: python scripts/build.py

      - name: Commit index.html
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git pull
          git add index.html
          git diff --staged --quiet || git commit -m "Auto-update sales board"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
